<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | Salmo Construction Services</title>
  <meta name="description" content="Oops! This page is still under construction. Let's get you back on track." />
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/responsive.css" />

  <style>
    /* 404-specific styles */
    body { overflow: hidden; }

    #page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 40px 60px;
      position: relative;
      overflow: hidden;
    }

    .err-num {
      font-size: clamp(100px, 20vw, 200px);
      font-weight: 900;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255,255,255,0.25);
      line-height: 0.9;
      margin-bottom: 40px;
      position: relative;
      user-select: none;
      letter-spacing: -4px;
    }

    .err-num::before {
      content: '404';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--white) 0%, rgba(255,255,255,0.3) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-stroke: 0;
      clip-path: polygon(0 0, 40% 0, 40% 100%, 0 100%);
    }

    .err-svg-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto 36px;
      position: relative;
    }

    .err-headline {
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 700;
      color: var(--white);
      margin-bottom: 16px;
      line-height: 1.25;
    }

    .err-sub {
      font-size: 15px;
      font-weight: 400;
      color: rgba(255,255,255,0.55);
      line-height: 1.8;
      max-width: 460px;
      margin: 0 auto 44px;
    }

    .err-ctas {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .err-bracket {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
      animation: spinSlow 20s linear infinite;
    }

    .err-bracket::after {
      content: '';
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      bottom: 10px;
      border: 1px dashed rgba(255,255,255,0.04);
      border-radius: 50%;
    }

    @keyframes spinSlow {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .err-label {
      font-size: 9px;
      font-weight: 300;
      letter-spacing: 5px;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav id="navbar" class="scrolled" role="navigation" aria-label="Main navigation">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo" aria-label="Salmo Construction Services — back to homepage">
      <img src="assets/images/salmo.png" alt="Salmo Construction Services" class="nav-logo-img" />
    </a>
    <a href="index.html#contact" class="nav-cta">
      Start Your Dream &rarr;
    </a>
  </div>
</nav>

<!-- 404 Main -->
<main id="page-404" class="blueprint-bg" role="main">

  <!-- Background ring decoration -->
  <div class="err-bracket" aria-hidden="true"></div>

  <p class="err-label">[ Error ]</p>

  <div class="err-num" aria-label="404" role="img">404</div>

  <!-- Blueprint construction icon -->
  <div class="err-svg-wrap" aria-hidden="true">
    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" width="120" height="120">
      <!-- Outer square frame -->
      <rect x="10" y="10" width="100" height="100" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <rect x="18" y="18" width="84" height="84" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" stroke-dasharray="4 4"/>

      <!-- Mini house blueprint -->
      <path d="M 30 80 L 30 45 L 60 25 L 90 45 L 90 80 Z" stroke="#FFFFFF" stroke-width="1.5" fill="none"/>
      <!-- Roof line -->
      <path d="M 20 47 L 60 22 L 100 47" stroke="#FFFFFF" stroke-width="1" fill="none" stroke-opacity="0.6"/>
      <!-- Door -->
      <rect x="50" y="60" width="20" height="20" stroke="#FFFFFF" stroke-width="1" fill="none"/>
      <!-- Windows -->
      <rect x="32" y="50" width="16" height="12" stroke="#FFFFFF" stroke-width="1" fill="none" stroke-opacity="0.7"/>
      <rect x="72" y="50" width="16" height="12" stroke="#FFFFFF" stroke-width="1" fill="none" stroke-opacity="0.7"/>

      <!-- Blueprint dimension lines -->
      <line x1="30" y1="90" x2="90" y2="90" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
      <line x1="30" y1="87" x2="30" y2="93" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>
      <line x1="90" y1="87" x2="90" y2="93" stroke="rgba(255,255,255,0.25)" stroke-width="0.7"/>

      <!-- Cross marks at corners -->
      <path d="M 7 7 L 13 13 M 7 13 L 13 7" stroke="rgba(255,255,255,0.20)" stroke-width="0.7"/>
      <path d="M 107 7 L 113 13 M 107 13 L 113 7" stroke="rgba(255,255,255,0.20)" stroke-width="0.7"/>
      <path d="M 7 107 L 13 113 M 7 113 L 13 107" stroke="rgba(255,255,255,0.20)" stroke-width="0.7"/>
      <path d="M 107 107 L 113 113 M 107 113 L 113 107" stroke="rgba(255,255,255,0.20)" stroke-width="0.7"/>
    </svg>
  </div>

  <h1 class="err-headline">Oops! This page is still under construction.</h1>
  <p class="err-sub">
    But your dream project doesn't have to be.<br />
    Let's get you back on track — your dream is waiting.
  </p>

  <div class="err-ctas">
    <a href="index.html" class="btn btn-cyan">
      Back to Home
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </a>
    <a href="index.html#contact" class="btn btn-outline-white">
      Contact Us
    </a>
  </div>

</main>

<!-- Footer -->
<footer id="footer" class="black-bg" role="contentinfo" style="position:relative; z-index:10;">
  <div class="container">
    <div class="footer-inner">
      <a href="index.html" class="footer-logo" aria-label="Back to Salmo Construction homepage">
        <img src="assets/images/salmo.png" alt="Salmo Construction Services" class="footer-logo-img" />
      </a>
      <p class="footer-copy">&copy; 2025 Salmo Construction Services. All Rights Reserved.</p>
      <a href="index.html" class="footer-back" aria-label="Go back to homepage">Back to Home &rarr;</a>
    </div>
  </div>
</footer>

<script src="js/main.js"></script>

</body>
</html>
